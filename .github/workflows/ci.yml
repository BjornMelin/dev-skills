name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-and-catalog:
    name: Rust workspace and catalog
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        run: rustup toolchain install 1.96.0 --profile minimal --component rustfmt,clippy
      - run: rustup default 1.96.0
      - name: Check Rust formatting
        run: cargo fmt --all --check
      - name: Lint Rust workspace
        run: cargo clippy --locked --workspace --all-targets -- -D warnings
      - name: Test Rust workspace
        run: cargo test --locked --workspace --all-targets
      - name: Verify policy documentation
        run: cargo run -q -p codex-dev -- --json policy docs-check
      - name: Smoke native Bun platform
        run: cargo run -q -p codex-dev -- --json bun doctor
      - name: Verify Agent Skills Lab catalog
        run: bash tools/skill/check_catalog.sh "$GITHUB_SHA"

  skills-and-docs:
    name: Skills, plugins, and docs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install Python validation dependency
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Validate skill and subagent contracts
        run: python3 tools/eval/skill_subagent_eval.py --json --strict
      - name: Validate plugin skills and manifests
        run: |
          set -euo pipefail
          for skill in plugins/*/skills/*; do
            if [[ -f "$skill/SKILL.md" ]]; then
              python3 tools/skill/quick_validate.py "$skill"
            fi
          done
          rg --files -g '*.json' .claude-plugin plugins | xargs -r jq empty
      - name: Verify generated plugin mirrors
        run: |
          set -euo pipefail
          node plugins/web-motion/scripts/validate-atomic-skills.mjs
          node plugins/design-motion/scripts/sync-skills.mjs --check
      - name: Validate design-motion tooling
        run: |
          set -euo pipefail
          python3 -m unittest discover -s skills/design-motion-system/scripts/tests
          node skills/r3f-scene-polish/scripts/audit.mjs doctor
      - name: Validate bootstrap manifests
        run: python3 tools/bootstrap/render_bootstrap_pack.py --validate
      - name: Install Kimi UI agent dependencies
        run: bun install --cwd skills/kimi-ui-agent --frozen-lockfile
      - name: Validate Kimi UI agent
        run: |
          set -euo pipefail
          bun run --cwd skills/kimi-ui-agent typecheck
          bun test --cwd skills/kimi-ui-agent
          bun skills/kimi-ui-agent/scripts/kimi-ui-agent.ts doctor --json
      - name: Check documentation links
        run: python3 tools/docs/check_links.py docs README.md AGENTS.md
