name: Agent Skills Catalog Dispatch

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/agent-skills-catalog-dispatch.yml"
      - "catalog/agent-skills-lab.json"
      - "crates/codex-dev-core/**"
      - "crates/codex-dev/**"
      - "docs/**"
      - "README.md"
      - "skills/**"
      - "tools/skill/**"
  workflow_dispatch:

concurrency:
  group: agent-skills-catalog-dispatch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dispatch-portfolio:
    name: Dispatch portfolio rebuild
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Verify catalog artifact
        run: |
          set -euo pipefail
          catalog_path="catalog/agent-skills-lab.json"
          generated_path="/tmp/agent-skills-lab.generated.json"
          tracked_normalized_path="/tmp/agent-skills-lab.tracked.normalized.json"
          generated_normalized_path="/tmp/agent-skills-lab.generated.normalized.json"

          test -f "${catalog_path}"
          jq -e '
            .schemaVersion == "agent_skills_lab_catalog.v1"
            and (.sourceCommit | test("^[0-9a-f]{7,40}$"; "i"))
          ' "${catalog_path}"

          catalog_generated_at="$(jq -er '.generatedAt' "${catalog_path}")"
          catalog_source_commit="$(jq -er '.sourceCommit' "${catalog_path}")"
          if [[ "${catalog_source_commit}" != "${GITHUB_SHA}" ]]; then
            echo "Catalog sourceCommit ${catalog_source_commit} differs from workflow SHA ${GITHUB_SHA}; comparing normalized generated output."
          fi

          cargo run -q -p codex-dev -- --json skills catalog \
            --generated-at "${catalog_generated_at}" \
            --source-commit "${GITHUB_SHA}" \
            --out "${generated_path}" \
            >/tmp/agent-skills-lab-envelope.json

          jq -S \
            --arg tracked_sha "${catalog_source_commit}" \
            --arg current_sha "${GITHUB_SHA}" \
            'walk(if type == "string" then gsub($tracked_sha; "<sourceCommit>") | gsub($current_sha; "<sourceCommit>") else . end)' \
            "${catalog_path}" >"${tracked_normalized_path}"
          jq -S \
            --arg tracked_sha "${catalog_source_commit}" \
            --arg current_sha "${GITHUB_SHA}" \
            'walk(if type == "string" then gsub($tracked_sha; "<sourceCommit>") | gsub($current_sha; "<sourceCommit>") else . end)' \
            "${generated_path}" >"${generated_normalized_path}"
          diff -u "${tracked_normalized_path}" "${generated_normalized_path}"

      - name: Dispatch bjornmelin.io rebuild
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_REPOSITORY_DISPATCH_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "Skipping dispatch because PLATFORM_REPOSITORY_DISPATCH_TOKEN is not configured."
            exit 0
          fi

          gh api repos/BjornMelin/bjornmelin-platform-io/dispatches \
            --method POST \
            --field event_type=agent-skills-catalog-updated \
            --field client_payload[source_repository]="${SOURCE_REPOSITORY}" \
            --field client_payload[source_ref]="${SOURCE_REF}" \
            --field client_payload[source_sha]="${SOURCE_SHA}" \
            --field client_payload[catalog_path]="catalog/agent-skills-lab.json"
