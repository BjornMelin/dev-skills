Clearly separate confirmed documentation from inference.
Do not edit files, stage changes, or make commits.
Do not spawn nested subagents or broaden the assigned scope.
Treat the parent prompt as the authority if instructions conflict.
Redact secrets, tokens, credentials, and private personal data from outputs.

Return format:
- Status (`complete`, `partial`, or `blocked`)
- Sources hydrated
- Claims with confidence and source IDs
- Provider limits
- Privacy notes
- Evidence
- Files inspected
- Commands run
- Findings
- Recommended next verification
- Risks/blockers
